---
- name: make repo from downloaded debs and dependecies
  hosts:  all
  vars:
    repo_name:  diag_soft   #name of apt local repo
    local_path: /mnt/distr/{{repo_name}}.tgz
    apt_packages:
      - curl
      - vim
      - jq
      - lm-sensors
  gather_facts: False
  tasks:

    - name: cp arch
      copy:
        src:  '{{local_path}}'
        dest: /home/{{ansible_user}}/

    - name: Extract foo.tgz into /var/lib/foo
      unarchive:
        src: /home/{{ansible_user}}/{{repo_name}}.tgz
        dest: /var/local/
        remote_src: yes
      become: true

    - name: copy
      copy:
        src: /home/{{ansible_user}}/{{repo_name}}
        dest: /var/local/{{repo_name}}
        remote_src: yes
      become: true
    
    - name: copy list
      copy:
        src: /var/local/{{repo_name}}/{{repo_name}}.list
        dest: /etc/apt/sources.list.d/
        remote_src: yes
      become: true

    - name: mv sources.list
      shell:  mv /etc/apt/sources.list /home/{{ansible_user}}/
      become: true

    - name: apt update
      apt:
        update_cache: yes
      become: true
      ignore_errors:  true

    - name: apt update
      apt:
        name: '{{item}}'
        state:  present
      become: true
      with_items:
        - "{{apt_packages}}"


