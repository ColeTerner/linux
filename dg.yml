        shell:  curl -s http://127.0.0.1:18810/jobs | jq -r ".[]|(.id)"|while read i;do curl -X DELETE http://127.0.0.1:18810/job/$i;done
        register: jobs
      - debug:  var=jobs.stdout_lines

      - name: reboot
        reboot:

      - name: sleep 15
