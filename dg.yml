      - name: Set cron
        cron:
          minute: 0
          hour: 6
          day:  "*"
          month:  "*"
          weekday:  "*"
          job:  'curl -s http://127.0.0.1:18810/jobs | jq -r ".[]|(.id)"|while read i;do curl -X DELETE http://127.0.0.1:18810/job/$i;done; sudo reboot'
          state:  present


